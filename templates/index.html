<!DOCTYPE html>
<html>
<head>
    <title>Sniper HQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #cfcfcf; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-control { background: #252525; border: 1px solid #444; color: #fff; }
        .form-control:focus { background: #2a2a2a; color: #fff; border-color: #0d6efd; }
        .btn-schedule { background: #0056b3; border: none; font-weight: bold; }
        .btn-run { font-weight: bold; }
        label { color: #888; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .system-badge { font-size: 1.2rem; font-weight: 800; color: #0d6efd; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <h1 class="mb-5 text-center">🎯 Sniper Control HQ</h1>
        <div class="row g-4">
            {% for sys in ['SPL', 'KCLS'] %}
            <div class="col-md-6">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="system-badge">{{ sys }}</span>
                        <span class="badge bg-dark border border-secondary text-secondary">{{ config[sys]['owner'] }}/{{ config[sys]['repo'] }}</span>
                    </div>
                    
                    <div class="mb-3">
                        <label>Drop Time (UTC HH:MM:SS)</label>
                        <input type="text" id="{{sys}}_DROP_TIME" class="form-control form-control-lg text-warning" placeholder="18:00:00">
                    </div>
                    
                    <div class="mb-3">
                        <label>Museum Config</label>
                        <textarea id="{{sys}}_MUSEUM_CONFIG" class="form-control" rows="3" placeholder="slug:Name,slug:Name"></textarea>
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <label>Strike Mins</label>
                            <input type="text" id="{{sys}}_STRIKE_MINUTES" class="form-control" value="1.0">
                        </div>
                        <div class="col-6">
                            <label>Offset MS</label>
                            <input type="text" id="{{sys}}_OFFSET_MS" class="form-control" value="-150">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button onclick="save('{{sys}}')" class="btn btn-schedule btn-lg">Update Secrets & Schedule Strike</button>
                        <button onclick="runNow('{{sys}}')" class="btn btn-outline-danger btn-run">Force Run Now</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        async function save(sys) {
            const data = {
                system: sys,
                SECRETS: {
                    DROP_TIME: document.getElementById(sys+'_DROP_TIME').value,
                    MUSEUM_CONFIG: document.getElementById(sys+'_MUSEUM_CONFIG').value,
                    STRIKE_MINUTES: document.getElementById(sys+'_STRIKE_MINUTES').value,
                    OFFSET_MS: document.getElementById(sys+'_OFFSET_MS').value
                }
            };
            const res = await fetch('/save', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            const out = await res.json();
            alert(out.status);
        }
        async function runNow(sys) {
            const res = await fetch('/run_now', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({system: sys})});
            const out = await res.json();
            alert(out.status);
        }
    </script>
</body>
</html>
