<!DOCTYPE html>
<html>
<head>
    <title>Sniper HQ v3.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; }
        .card { background: #111; border: 1px solid #333; }
        .form-label { font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 0.9rem; }
        .form-control:focus { background: #222; border-color: #0d6efd; color: #fff; box-shadow: none; }
        .log-terminal { background: #000; border: 1px solid #222; color: #00ff41; font-family: monospace; font-size: 0.75rem; height: 80px; overflow-y: auto; padding: 10px; border-radius: 4px; }
        .status-pill { background: #000; border: 1px solid #0d6efd; color: #0d6efd; padding: 4px 12px; font-family: monospace; font-size: 0.8rem; border-radius: 20px; }
        .section-title { color: #0d6efd; font-size: 0.8rem; border-bottom: 1px solid #222; margin: 15px 0 10px 0; padding-bottom: 5px; }
    </style>
</head>
<body class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold m-0">🎯 Sniper Control HQ <span class="text-secondary fs-6">v3.1</span></h1>
            <div class="d-flex gap-2">
                <div id="SPL_hud" class="status-pill">SPL: Loading...</div>
                <div id="KCLS_hud" class="status-pill">KCLS: Loading...</div>
            </div>
        </div>

        <div class="row g-4">
            {% for sys in ['SPL', 'KCLS'] %}
            <div class="col-lg-6">
                <div class="card p-4">
                    <h4 class="text-primary fw-bold mb-3">{{ sys }} Mission Management</h4>

                    <!-- ACTIONS CONFIG -->
                    <div class="section-title">GitHub Actions Config</div>
                    <div class="row g-2 mb-3">
                        <div class="col-12">
                            <label class="form-label">Workflow Filename (e.g. spl_sniper.yml)</label>
                            <input type="text" id="{{sys}}_workflow_file" class="form-control" value="{{ saved[sys]['workflow_file'] }}">
                        </div>
                    </div>

                    <!-- MISSION CRITICAL -->
                    <div class="section-title">Mission Parameters</div>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">Drop Time (UTC)</label>
                            <input type="text" id="{{sys}}_drop_time" class="form-control text-warning" value="{{ saved[sys]['drop_time'] }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">App Mode</label>
                            <select id="{{sys}}_app_mode" class="form-control">
                                <option value="booking" {% if saved[sys]['app_mode'] == 'booking' %}selected{% endif %}>Booking</option>
                                <option value="alert" {% if saved[sys]['app_mode'] == 'alert' %}selected{% endif %}>Alert Only</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Museum Config (slug:Name or ID:Name)</label>
                        <textarea id="{{sys}}_museum_config" class="form-control" rows="2">{{ saved[sys]['museum_config'] }}</textarea>
                    </div>

                    {% if sys == 'SPL' %}
                    <div class="mt-3">
                        <label class="form-label">Museum IDs (slug:TechID)</label>
                        <textarea id="{{sys}}_museum_ids" class="form-control" rows="2">{{ saved[sys]['museum_ids'] }}</textarea>
                    </div>
                    {% endif %}

                    <!-- TUNING -->
                    <div class="section-title">System Tuning</div>
                    <div class="row g-2 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Strike Mins</label>
                            <input type="text" id="{{sys}}_strike_minutes" class="form-control" value="{{ saved[sys]['strike_minutes'] }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Offset MS</label>
                            <input type="text" id="{{sys}}_offset_ms" class="form-control" value="{{ saved[sys]['offset_ms'] }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Base URL</label>
                            <input type="text" id="{{sys}}_base_url" class="form-control" value="{{ saved[sys]['base_url'] }}">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-3">
                        <button onclick="save('{{sys}}')" class="btn btn-primary btn-lg">Sync Secrets & Schedule</button>
                        <button onclick="runNow('{{sys}}')" class="btn btn-outline-danger">Manual Run Now</button>
                    </div>

                    <div class="form-label">Forensic Output</div>
                    <div id="{{sys}}_log" class="log-terminal">System ready. Waiting for input...</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        async function updateHud() {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('SPL_hud').innerText = "SPL: " + data.SPL;
            document.getElementById('KCLS_hud').innerText = "KCLS: " + data.KCLS;
        }
        function writeLog(sys, msg) {
            const el = document.getElementById(sys+'_log');
            el.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        }
        async function save(sys) {
            const fields = ['base_url','lib_user','lib_pass','patron_email','ntfy_topic','drop_time','app_mode','priority_museums','auto_book_days','museum_config','museum_ids','strike_minutes','offset_ms','workflow_file'];
            const secrets = {};
            fields.forEach(f => { 
                const el = document.getElementById(sys+'_'+f);
                if(el) secrets[f] = el.value;
            });
            writeLog(sys, "Syncing to GitHub...");
            const res = await fetch('/save', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({system: sys, SECRETS: secrets})});
            const out = await res.json();
            writeLog(sys, out.status);
            updateHud();
        }
        async function runNow(sys) {
            writeLog(sys, "Requesting manual trigger...");
            const res = await fetch('/run_now', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({system: sys})});
            const out = await res.json();
            writeLog(sys, out.status);
        }
        setInterval(updateHud, 5000); updateHud();
    </script>
</body>
</html>
