<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper HQ v3.3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --primary: #0d6efd; --green: #00ff41; --text: #e0e0e6; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; }
        .card { background-color: var(--card); border: 1px solid #2d2d35; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .form-label { font-size: 0.65rem; color: #8a8a98; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 0.5px; }
        .form-control, .form-select { background-color: #1c1c21; border: 1px solid #363641; color: #fff; font-size: 0.85rem; }
        .form-control:focus { background-color: #222229; border-color: var(--primary); color: #fff; box-shadow: none; }
        .log-terminal { background: #000; border: 1px solid #222; color: var(--green); font-family: 'Courier New', monospace; font-size: 0.7rem; height: 100px; overflow-y: auto; padding: 10px; border-radius: 6px; margin-top: 15px; line-height: 1.2; }
        .status-badge { background: #000; border: 1px solid var(--primary); color: var(--primary); padding: 4px 12px; font-family: monospace; font-size: 0.75rem; border-radius: 4px; }
        .section-header { color: var(--primary); font-size: 0.7rem; font-weight: 900; border-bottom: 1px solid #2d2d35; margin: 15px 0 10px 0; padding-bottom: 4px; text-transform: uppercase; }
        .btn-sync { font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        textarea { resize: none; }
    </style>
</head>
<body class="py-4">
    <div class="container-fluid px-lg-5">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 fw-bold m-0 text-white">🎯 SNIPER COMMAND CENTER</h1>
                <small class="text-secondary">Distributed GHA Strike Network v3.3</small>
            </div>
            <div class="d-flex gap-3">
                <div id="SPL_hud" class="status-badge">SPL: IDLE</div>
                <div id="KCLS_hud" class="status-badge">KCLS: IDLE</div>
            </div>
        </header>

        <div class="row g-4">
            {% for sys in ['SPL', 'KCLS'] %}
            <div class="col-xl-6">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h2 class="h5 fw-bold m-0 text-white">{{ sys }} MISSION</h2>
                        <div style="width: 200px;">
                            <label class="form-label">Workflow YAML</label>
                            <input type="text" id="{{sys}}_workflow_file" class="form-control form-control-sm" value="{{ saved[sys]['workflow_file'] }}">
                        </div>
                    </div>

                    <div class="section-header">Targeting & Environment</div>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label">Drop Time (UTC)</label>
                            <input type="text" id="{{sys}}_drop_time" class="form-control text-warning fw-bold" value="{{ saved[sys]['drop_time'] }}" placeholder="HH:MM:SS">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">App Mode</label>
                            <select id="{{sys}}_app_mode" class="form-select">
                                <option value="booking" {% if saved[sys]['app_mode'] == 'booking' %}selected{% endif %}>BOOKING</option>
                                <option value="alert" {% if saved[sys]['app_mode'] == 'alert' %}selected{% endif %}>ALERT ONLY</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Base URL</label>
                            <input type="text" id="{{sys}}_base_url" class="form-control" value="{{ saved[sys]['base_url'] }}">
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Museum Config (ID:Name)</label>
                        <textarea id="{{sys}}_museum_config" class="form-control" rows="2">{{ saved[sys]['museum_config'] }}</textarea>
                    </div>

                    {% if sys == 'SPL' %}
                    <div class="mt-3">
                        <label class="form-label">Museum IDs (slug:TechID)</label>
                        <textarea id="{{sys}}_museum_ids" class="form-control" rows="2">{{ saved[sys]['museum_ids'] }}</textarea>
                    </div>
                    {% endif %}

                    <div class="section-header">Auth & Telemetry</div>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label">Lib User</label>
                            <input type="text" id="{{sys}}_lib_user" class="form-control" value="{{ saved[sys]['lib_user'] }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Lib Pass</label>
                            <input type="password" id="{{sys}}_lib_pass" class="form-control" value="{{ saved[sys]['lib_pass'] }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Ntfy Topic</label>
                            <input type="text" id="{{sys}}_ntfy_topic" class="form-control" value="{{ saved[sys]['ntfy_topic'] }}">
                        </div>
                    </div>
                    {% if sys == 'SPL' %}
                    <div class="mt-2">
                        <label class="form-label">Patron Email</label>
                        <input type="text" id="{{sys}}_patron_email" class="form-control" value="{{ saved[sys]['patron_email'] }}">
                    </div>
                    {% endif %}

                    <div class="section-header">Strike Tuning</div>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">Priority Slugs/IDs (CSV)</label>
                            <input type="text" id="{{sys}}_priority_museums" class="form-control" value="{{ saved[sys]['priority_museums'] }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Auto-Book Days</label>
                            <input type="text" id="{{sys}}_auto_book_days" class="form-control" value="{{ saved[sys]['auto_book_days'] }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Strike Duration (Minutes)</label>
                            <input type="text" id="{{sys}}_strike_minutes" class="form-control" value="{{ saved[sys]['strike_minutes'] }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Network Offset (MS)</label>
                            <input type="text" id="{{sys}}_offset_ms" class="form-control" value="{{ saved[sys]['offset_ms'] }}">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button onclick="save('{{sys}}')" class="btn btn-primary btn-sync flex-grow-1">Sync & Schedule</button>
                        <button onclick="runNow('{{sys}}')" class="btn btn-outline-danger btn-sync">Manual Fire</button>
                    </div>

                    <div id="{{sys}}_log" class="log-terminal">TERMINAL READY > STANDBY</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        async function updateHud() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                document.getElementById('SPL_hud').innerText = "SPL: " + data.SPL;
                document.getElementById('KCLS_hud').innerText = "KCLS: " + data.KCLS;
            } catch(e) {}
        }

        function tlog(sys, msg) {
            const el = document.getElementById(sys + '_log');
            const time = new Date().toLocaleTimeString();
            el.innerHTML = `[${time}] ${msg}<br>` + el.innerHTML;
        }

        async function save(sys) {
            const fields = ['workflow_file','base_url','lib_user','lib_pass','patron_email','ntfy_topic','drop_time','app_mode','priority_museums','auto_book_days','museum_config','museum_ids','strike_minutes','offset_ms'];
            const secrets = {};
            fields.forEach(f => {
                const el = document.getElementById(sys+'_'+f);
                if(el) secrets[f] = el.value;
            });

            tlog(sys, "Initing Database update & GitHub Sync...");
            
            try {
                const res = await fetch('/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({system: sys, SECRETS: secrets})
                });
                const out = await res.json();
                tlog(sys, out.status);
                updateHud();
            } catch (e) {
                tlog(sys, "CRITICAL BROWSER ERROR: " + e.message);
            }
        }

        async function runNow(sys) {
            const workflow = document.getElementById(sys+'_workflow_file').value;
            tlog(sys, "Sending manual dispatch signal...");
            try {
                const res = await fetch('/run_now', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({system: sys, workflow_file: workflow})
                });
                const out = await res.json();
                tlog(sys, out.status);
            } catch (e) {
                tlog(sys, "DISPATCH ERROR: " + e.message);
            }
        }

        setInterval(updateHud, 5000);
        updateHud();
    </script>
</body>
</html>
